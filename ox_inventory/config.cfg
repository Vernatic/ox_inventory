### ส่วนกลาง

# เปิดใช้งาน event handlers และฟังก์ชันตาม framework ที่เลือก (รองรับ: ox, esx, qb, nd)
setr inventory:framework "esx"

# จำนวนช่องในกระเป๋าของผู้เล่น
setr inventory:slots 110

# น้ำหนักที่ผู้เล่นแบกได้สูงสุด หน่วยเป็นกรัม (framework บางตัวอาจเขียนทับค่านี้)
setr inventory:weight 50000

# เปิดการรองรับ qtarget/ox_target แบบในตัว สำหรับ stash, shop และจุดโต้ตอบอื่น ๆ
# หมายเหตุ: qtarget เลิกพัฒนาต่อแล้ว ในอนาคตอาจถูกถอดการรองรับออก (เหลือเฉพาะ ox_target หรือบางฟีเจอร์เท่านั้น)
setr inventory:target true

# รายชื่อ job ที่มีสิทธิ์เข้าคลังตำรวจ, ตู้หลักฐาน และฟีเจอร์ตำรวจอื่น ๆ
setr inventory:police ["police", "sheriff"]

### ฝั่ง Client

# URL หรือ path ที่ใช้โหลดรูปไอเท็ม
setr inventory:imagepath "nui://ox_inventory/web/images"

# ให้ปืนรีโหลดอัตโนมัติเมื่อกระสุนเหลือ 0
setr inventory:autoreload false

# เบลอฉากหลังขณะเปิดกระเป๋า
setr inventory:screenblur true

# ปุ่มลัดเริ่มต้นสำหรับเปิดกระเป๋าหลัก, กระเป๋ารอง และ hotbar
setr inventory:keys ["F2"]

# ระบุ control action ที่ยังกดใช้งานได้ระหว่างเปิดกระเป๋า
setr inventory:enablekeys [249]

# บังคับให้ต้องเล็งก่อนจึงจะยิงปืนได้
setr inventory:aimedfiring false

# แสดงรายชื่อผู้เล่นที่อยู่ใกล้ตอนจะให้ไอเท็ม
setr inventory:giveplayerlist true

# เปิดหรือปิดอนิเมชันชัก/เก็บอาวุธ
setr inventory:weaponanims true

# เปิดหรือปิดการแจ้งเตือนเมื่อได้รับ/เสียไอเท็ม
setr inventory:itemnotify true

# ปิด marker ของไอเท็มที่ดรอป และใช้การสร้าง prop แทน
setr inventory:dropprops true
setr inventory:dropmodel "prop_paper_bag_01"

# ปลดอาวุธจากผู้เล่นหากถืออาวุธที่ระบบมองว่าไม่ถูกต้อง (เช่น ไม่ได้ใช้งานผ่านไอเท็มอาวุธ)
setr inventory:weaponmismatch false

# รายชื่ออาวุธที่ไม่ต้องตรวจสอบ weapon mismatch (เช่น ['WEAPON_SHOVEL', 'WEAPON_HANDCUFFS'])
setr inventory:ignoreweapons []


### ฝั่ง Server

# เปรียบเทียบเวอร์ชันปัจจุบันกับ release ล่าสุดบน GitHub
set inventory:versioncheck true

# ลบ stash ที่ไม่มีการเปลี่ยนแปลงเกินระยะเวลาที่กำหนด
set inventory:clearstashes "12 MONTH"

# URL ของ Discord webhook ใช้กับการ log หรือ moderation ของ metadata ประเภท imageurl (image embeds)
set inventory:webhook ""


# ระดับการ log ผ่าน ox_lib (0: ปิด, 1: ปกติ, 2: รวม AddItem/RemoveItem และการซื้อของจากร้านทั้งหมด)
set inventory:loglevel 2

# เปิดให้ราคาสินค้าในร้านปรับขึ้นลงแบบสุ่ม
set inventory:randomprices false

# สุ่มของในรถที่ไม่มีเจ้าของและในถังขยะ
set inventory:randomloot false

# เกรดงานขั้นต่ำที่สามารถนำของออกจากตู้หลักฐานได้
set inventory:evidencegrade 2

# ตัดช่องว่างหัวท้ายของป้ายทะเบียนก่อนตรวจสอบความเป็นเจ้าของรถ
setr inventory:trimplate true

